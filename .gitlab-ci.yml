stages:
  - test
  - build

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"

# ──────────────────────────────────────────────
# STAGE 1 — Test (opzionale, commenta se lento)
# ──────────────────────────────────────────────
test:
  stage: test
  image: python:3.12-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - pip install -r requirements-minimal.txt bcrypt SQLAlchemy prometheus_client -q
    - pip install -r requirements-test.txt -q
  script:
    - python -m pytest tests/ -x -q --tb=short 2>&1 | tail -20
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ──────────────────────────────────────────────
# STAGE 2 — Build & Push immagine Docker
# ──────────────────────────────────────────────
docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Tag con sha commit (sempre) + "latest" sul branch principale
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest
        echo "Pushed $IMAGE_NAME:latest"
      fi
    # Tag versione se è un tag git (es. v2.5.4)
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $IMAGE_NAME:$CI_COMMIT_TAG
        docker push $IMAGE_NAME:$CI_COMMIT_TAG
        echo "Pushed $IMAGE_NAME:$CI_COMMIT_TAG"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        # Nelle MR fa solo build (no push) per verificare che compila
        CI_REGISTRY_USER: ""
